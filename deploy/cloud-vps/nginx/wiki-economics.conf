server {
    listen 80;
    server_name _;

    root /srv/wiki-economics/site/current;
    index index.html;

    location = /admin {
        return 404;
    }

    location ^~ /_observablehq/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location ^~ /_npm/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location ^~ /_file/ {
        expires 10m;
        add_header Cache-Control "public, max-age=600";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
