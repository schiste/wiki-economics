name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check shell script syntax
        run: bash -n scripts/*.sh scripts/lib/*.sh site/data-build/*.sh deploy/cloud-vps/*.sh

      - name: Check Node entrypoint syntax
        run: |
          node --check site/admin-server.cjs
          node --check site/observablehq.config.js

      - name: Check helper CLI entrypoints
        run: |
          ./scripts/build-site.sh --help
          ./scripts/refresh.sh --help
          ./scripts/setup.sh --help

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-targets --all-features

      - name: Check Python scripts
        run: python3 -m py_compile scripts/fetch_patrol.py scripts/compute_patrol.py scripts/check_lcov.py scripts/test_fetch_patrol.py

      - name: Run Python tests
        run: python3 -m unittest scripts/test_fetch_patrol.py

      - name: Check docs
        run: cargo doc --no-deps

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install coverage tooling
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Run coverage
        run: cargo llvm-cov --workspace --all-features --all-targets --lcov --output-path target/llvm-cov.info

      - name: Validate LCOV line coverage
        run: python3 scripts/check_lcov.py target/llvm-cov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: llvm-cov-lcov
          path: target/llvm-cov.info
          if-no-files-found: error

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install security tooling
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit

      - name: cargo-deny
        run: cargo deny check advisories bans licenses sources

      - name: cargo-audit
        run: cargo audit -D warnings
